<style>
        body {
            background-color: var(--tw-colors-background);
            background-image: radial-gradient(var(--tw-colors-surface-container-high) 1px, transparent 1px);
            background-size: 24px 24px;
        }
        
        .tactile-shadow-level-1 {
            box-shadow: 0px 4px 0px 0px rgba(0,0,0,0.05);
        }
        
        .tactile-button-shadow {
            box-shadow: 0px 6px 0px 0px var(--tw-shadow-color);
        }
        
        .tactile-active:active {
            transform: translateY(6px);
            box-shadow: 0px 0px 0px 0px transparent;
        }

        .ambient-float-shadow {
            box-shadow: 0px 20px 40px -10px rgba(0,0,0,0.1);
        }

        .pulse-halo {
            animation: pulse-ring 2s cubic-bezier(0.4, 0, 0.6, 1) infinite;
        }

        @keyframes pulse-ring {
            0% { box-shadow: 0 0 0 0 rgba(74, 222, 128, 0.8), 0px 6px 0px 0px var(--tw-shadow-color); }
            70% { box-shadow: 0 0 0 30px rgba(74, 222, 128, 0), 0px 6px 0px 0px var(--tw-shadow-color); }
            100% { box-shadow: 0 0 0 0 rgba(74, 222, 128, 0), 0px 6px 0px 0px var(--tw-shadow-color); }
        }

        .draw-animation {
            stroke-dasharray: 1000;
            stroke-dashoffset: 1000;
            animation: dash 3s ease-in-out forwards;
        }

        @keyframes dash {
            to {
                stroke-dashoffset: 0;
            }
        }
    </style>

<body class="text-on-surface font-body-md min-h-screen flex flex-col relative overflow-x-hidden">
<!-- TopNavBar (Shared Component Implemented) -->
<header class="bg-surface-container-low shadow-[0px_4px_0px_0px_rgba(0,0,0,0.05)] w-full relative z-20">
<div class="flex justify-between items-center w-full px-margin-mobile md:px-margin-desktop py-4">
<div class="flex items-center gap-3">
<span class="material-symbols-outlined text-primary text-4xl" style="font-variation-settings: 'FILL' 1;">draw</span>
<span class="font-headline-xl text-primary tracking-tight">TalkArt</span>
</div>
<!-- Status Indicator -->
<div class="hidden md:flex items-center bg-secondary-container text-on-secondary-container px-6 py-2 rounded-full font-label-bold tactile-shadow-level-1 border-2 border-surface-container-lowest">
<span class="material-symbols-outlined mr-2" style="font-variation-settings: 'FILL' 1;">face_4</span>
                小智老师正在教你画画
            </div>
<button class="text-on-surface-variant hover:bg-surface-container-high transition-colors p-2 rounded-full tactile-active flex items-center justify-center">
<span class="material-symbols-outlined text-3xl">account_circle</span>
</button>
</div>
</header>

<div class="bg-surface-container-lowest rounded-[2rem] p-6 ambient-float-shadow relative self-start md:self-center ml-4 md:ml-0 mb-2 z-30 max-w-md border-2 border-surface-container animate-[bounce_3s_ease-in-out_infinite]">
<!-- Speech Bubble Tail -->
<div class="absolute -bottom-4 left-10 w-0 h-0 border-l-[16px] border-l-transparent border-t-[16px] border-t-surface-container-lowest border-r-[16px] border-r-transparent filter drop-shadow-sm"></div>
<div class="flex items-center gap-4">
<div class="w-14 h-14 bg-secondary-container rounded-full flex items-center justify-center shrink-0 border-[3px] border-surface-container-lowest tactile-shadow-level-1">
<span class="material-symbols-outlined text-on-secondary-container text-3xl" style="font-variation-settings: 'FILL' 1;">smart_toy</span>
</div>
<p class="font-headline-lg-mobile text-on-surface leading-tight">现在让我们给小房子画上圆圆的房顶吧！</p>
</div>

<svg class="w-2/3 h-2/3" fill="none" viewbox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">

<rect fill="#E6E3D3" height="80" stroke="#6D7B6D" stroke-linejoin="round" stroke-width="4" width="100" x="50" y="100"></rect>
<!-- Chimney (Completed) -->
<rect fill="#DEDACB" height="30" stroke="#6D7B6D" stroke-linejoin="round" stroke-width="4" width="15" x="130" y="50"></rect>

<path class="draw-animation" d="M35 100 L100 40 L165 100 Z" fill="none" stroke="#006D36" stroke-linecap="round" stroke-linejoin="round" stroke-width="8"></path>
<!-- Guidelines for doors/windows -->
<rect fill="none" height="40" stroke="#BCCABB" stroke-dasharray="4 4" stroke-width="2" width="30" x="85" y="140"></rect>
<rect fill="none" height="20" stroke="#BCCABB" stroke-dasharray="4 4" stroke-width="2" width="20" x="60" y="120"></rect>

</svg>

<div class="absolute inset-0 rounded-full border-4 border-primary-container animate-ping opacity-20"></div>
                    2

<div class="w-6 md:w-12 h-2 bg-surface-container-high rounded-full"></div>
